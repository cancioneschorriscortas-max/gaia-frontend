<!DOCTYPE html>
<html lang="gl">
  <head>
    <meta charset="utf-8" />

    <!-- Viewport optimizado para móbil e respecto de safe-area -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Cor de tema (cosmos-900 do sistema GAIA) -->
    <meta name="theme-color" content="#0a1020" />

    <!-- Metadatos do proxecto -->
    <title>GAIA · Arquivo do Coñecemento Galego</title>
    <meta name="description" content="GAIA é un grafo semántico aberto onde o alumnado galego constrúe, coas súas profesoras e profesores, un arquivo do saber compartido." />
    <meta name="author" content="Proxecto GAIA" />

    <!-- Open Graph para compartir en redes -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GAIA · Arquivo do Coñecemento Galego" />
    <meta property="og:description" content="Unha constelación de ideas feita en Galicia, por Galicia, para Galicia." />
    <meta property="og:locale" content="gl_ES" />

    <!-- Favicon e iconos -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!--
      ═══════════════════════════════════════════════════
      FONTES GAIA v1.0
      ═══════════════════════════════════════════════════
      Fraunces           → display (títulos, logo, números grandes)
      Atkinson Hyperlegible → body (texto, UI — deseñada para accesibilidade)
      JetBrains Mono     → mono (técnico, metadatos, breadcrumbs)
      Space Grotesk      → mantida por compatibilidade (uso residual se algún compoñente aínda dependía dela)
      ═══════════════════════════════════════════════════
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>Precisas activar JavaScript para usar GAIA.</noscript>
    <div id="root"></div>
  </body>
</html>
